---
- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: '0755'
  loop:
    - "{{ prometheus_home }}"
    - "{{ prometheus_data }}"

- name: Check if Prometheus is already installed
  stat:
    path: "{{ prometheus_home }}/prometheus"
  register: prometheus_installed

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: '0644'
  when: not prometheus_installed.stat.exists

- name: Extract Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp
    remote_src: yes
  when: not prometheus_installed.stat.exists

- name: Install Prometheus
  shell: |
    cp -r /tmp/prometheus-{{ prometheus_version }}.linux-amd64/* {{ prometheus_home }}/
    chown -R {{ prometheus_user }}:{{ prometheus_user }} {{ prometheus_home }}
  when: not prometheus_installed.stat.exists

- name: Clean up download
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/prometheus.tar.gz
    - /tmp/prometheus-{{ prometheus_version }}.linux-amd64
  when: not prometheus_installed.stat.exists

- name: Configure Prometheus
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_home }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: '0644'
  notify: restart prometheus

- name: Create targets.d directory for showcase service discovery
  file:
    path: "{{ prometheus_home }}/targets.d"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_user }}"
    mode: '0755'

- name: Create Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start Prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started

- name: Wait for Prometheus to start
  wait_for:
    port: 9090
    timeout: 30
