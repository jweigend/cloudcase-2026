---
# Showcase Teardown: Elasticsearch + Monitoring Data
#
# Entfernt alle Showcase-spezifischen Services sauber vom Cluster.
# Base-Installation (common, dnsmasq, monitoring) bleibt erhalten.
#
# Verwendung:
#   ansible-playbook -i inventory/baremetal/hosts.yml \
#                    -i showcases/elasticsearch-monitoring/inventory.yml \
#                    showcases/elasticsearch-monitoring/teardown.yml
#

# ============================================================
# Webapp Frontend + nginx entfernen
# ============================================================
- name: Remove Webapp Frontend
  hosts: monitoring
  become: true
  tasks:
    - name: Remove nginx webapp site
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/webapp
        - /etc/nginx/sites-available/webapp
      notify: reload nginx

    - name: Remove frontend files
      file:
        path: /opt/webapp-frontend
        state: absent

    - name: Stop and remove nginx
      apt:
        name: nginx
        state: absent
        purge: true
      ignore_errors: true

  handlers:
    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
      ignore_errors: true

# ============================================================
# Webapp Backend entfernen
# ============================================================
- name: Remove Webapp Backend
  hosts: monitoring
  become: true
  tasks:
    - name: Stop and disable webapp-backend
      systemd:
        name: webapp-backend
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove webapp-backend service
      file:
        path: /etc/systemd/system/webapp-backend.service
        state: absent

    - name: Remove backend files
      file:
        path: /opt/webapp-backend
        state: absent

    - name: Reload systemd
      systemd:
        daemon_reload: true

# ============================================================
# JupyterLab entfernen
# ============================================================
- name: Remove JupyterLab
  hosts: monitoring
  become: true
  tasks:
    - name: Stop and disable jupyterlab
      systemd:
        name: jupyterlab
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove jupyterlab service
      file:
        path: /etc/systemd/system/jupyterlab.service
        state: absent

    - name: Remove Jupyter files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /opt/jupyter
        - /data/jupyter

# ============================================================
# elasticsearch_exporter entfernen
# ============================================================
- name: Remove elasticsearch_exporter
  hosts: elasticsearch_data[0]
  become: true
  tasks:
    - name: Stop and disable elasticsearch-exporter
      systemd:
        name: elasticsearch-exporter
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove exporter service
      file:
        path: /etc/systemd/system/elasticsearch-exporter.service
        state: absent

    - name: Remove exporter files
      file:
        path: /opt/elasticsearch-exporter
        state: absent

    - name: Reload systemd
      systemd:
        daemon_reload: true

# ============================================================
# Elasticsearch entfernen
# ============================================================
- name: Remove Elasticsearch
  hosts: elasticsearch_data
  become: true
  tasks:
    - name: Stop and disable elasticsearch
      systemd:
        name: elasticsearch
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove Elasticsearch packages
      ansible.builtin.apt:
        name: elasticsearch
        state: absent
        purge: true
      ignore_errors: true

    - name: Remove Elasticsearch config and data
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/elasticsearch
        - /data/elasticsearch
        - /var/lib/elasticsearch
        - /var/log/elasticsearch

    - name: Remove Elasticsearch apt repository
      ansible.builtin.apt_repository:
        repo: "deb https://artifacts.elastic.co/packages/9.x/apt stable main"
        state: absent
        filename: elasticsearch
      ignore_errors: true

# ============================================================
# Grafana Dashboards + Prometheus Targets entfernen
# ============================================================
- name: Remove Showcase Monitoring
  hosts: monitoring
  become: true
  tasks:
    - name: Remove Grafana dashboards
      file:
        path: "/var/lib/grafana/dashboards/{{ item }}"
        state: absent
      loop:
        - use-dashboard.json
        - red-dashboard.json
        - elasticsearch-dashboard.json
      notify: restart grafana

    - name: Remove Prometheus showcase targets
      file:
        path: /opt/prometheus/targets.d/elasticsearch-monitoring.yml
        state: absent
      notify: reload prometheus

    - name: Reload systemd
      systemd:
        daemon_reload: true

  handlers:
    - name: restart grafana
      systemd:
        name: grafana-server
        state: restarted

    - name: reload prometheus
      systemd:
        name: prometheus
        state: reloaded
