# ============================================================
# ZooKeeper entfernen
# ============================================================
- name: Remove ZooKeeper
  hosts: zookeeper
  become: true
  tasks:
    - name: Stop and disable zookeeper
      systemd:
        name: zookeeper
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove zookeeper service
      file:
        path: /etc/systemd/system/zookeeper.service
        state: absent

    - name: Remove ZooKeeper files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /opt/zookeeper
        - /data/zookeeper

# ============================================================
# Grafana Dashboards + Prometheus Targets entfernen
# ============================================================
- name: Remove Showcase Monitoring
  hosts: monitoring
  become: true
  tasks:
    - name: Remove Grafana dashboards
      file:
        path: "/var/lib/grafana/dashboards/{{ item }}"
        state: absent
      loop:
        - use-dashboard.json
        - red-dashboard.json
        - spark-dashboard.json
        - solr-dashboard.json
      notify: restart grafana

    - name: Remove Prometheus showcase targets
      file:
        path: /opt/prometheus/targets.d/solr-spark-taxi.yml
        state: absent
      notify: reload prometheus

    - name: Reload systemd
      systemd:
        daemon_reload: true

  handlers:
    - name: restart grafana
      systemd:
        name: grafana-server
        state: restarted

    - name: reload prometheus
      systemd:
        name: prometheus
        state: reloaded
