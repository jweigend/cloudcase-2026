    - name: Remove solr-exporter service
      file:
        path: /etc/systemd/system/solr-exporter.service
        state: absent

# ============================================================
# Spark entfernen
# ============================================================
- name: Remove Spark Workers
  hosts: spark_workers
  become: true
  tasks:
    - name: Stop and disable spark-worker
      systemd:
        name: spark-worker
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove spark-worker service
      file:
        path: /etc/systemd/system/spark-worker.service
        state: absent

- name: Remove Spark Master
  hosts: spark_master
  become: true
  tasks:
    - name: Stop and disable spark-master
      systemd:
        name: spark-master
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove spark-master service
      file:
        path: /etc/systemd/system/spark-master.service
        state: absent

- name: Remove Spark files
  hosts: spark
  become: true
  tasks:
    - name: Remove Spark installation and data
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /opt/spark
        - /data/spark

# ============================================================
# Solr entfernen
# ============================================================
- name: Remove Solr
  hosts: solr
  become: true
  tasks:
    - name: Stop and disable solr
      systemd:
        name: solr
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove solr service
      file:
        path: /etc/systemd/system/solr.service
