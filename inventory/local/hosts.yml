---
# Cloudkoffer Local VM Inventory (Platzhalter)
#
# Hier kommen die IPs der lokalen VMs rein,
# sobald das VM-Tooling entschieden ist.
#
# Struktur identisch zu baremetal/hosts.yml,
# nur mit anderen IPs/SSH-Keys.
#

all:
  vars:
    ansible_user: cloudadmin
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3
    domain: cloud.local
    java_home: /usr/lib/jvm/java-17-openjdk-amd64
    prometheus_version: "2.54.1"
    grafana_version: "11.4.0"
    node_exporter_version: "1.8.2"

  hosts:
    node0:
      ansible_host: 192.168.56.100  # TODO: Anpassen
    node1:
      ansible_host: 192.168.56.101
    node2:
      ansible_host: 192.168.56.102
    node3:
      ansible_host: 192.168.56.103
    node4:
      ansible_host: 192.168.56.104

  children:
    monitoring:
      hosts:
        node0:
