---
# Cloudkoffer Baremetal Inventory
#
# Nur Hardware-Fakten: IPs, SSH-User, Domain.
# Showcase-spezifische Gruppen und Versionen kommen aus
# showcases/<name>/inventory.yml
#

all:
  vars:
    ansible_user: cloudadmin
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3

    # Domain
    domain: cloud.local

    # Java
    java_home: /usr/lib/jvm/java-17-openjdk-amd64

    # Base-Versionen (Monitoring-Stack)
    prometheus_version: "2.54.1"
    grafana_version: "11.4.0"
    node_exporter_version: "1.8.2"

  hosts:
    node0:
      ansible_host: 192.168.1.100
    node1:
      ansible_host: 192.168.1.101
    node2:
      ansible_host: 192.168.1.102
    node3:
      ansible_host: 192.168.1.103
    node4:
      ansible_host: 192.168.1.104

  children:
    # Monitoring Server (Prometheus + Grafana)
    monitoring:
      hosts:
        node0:
